version: '3.8'

services:
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: finops_backend_api
    ports:
      - "8000:8000"
    # PoC用: メモリ制限をかけてOOM(Out Of Memory)キラーの挙動やメモリリークを検証しやすくする
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
